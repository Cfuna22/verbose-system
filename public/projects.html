<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Erastus Ochieng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
        theme: {
            extend: {}
        }
        }
    </script>
    </head>

    <body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex items-center justify-between">
            <div>
            <h1 class="text-3xl font-bold text-gray-900">All Projects</h1>
            <p class="text-gray-600 mt-1">Comprehensive portfolio of technical solutions</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="refreshImages()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
                <button onclick="window.close()" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800 transition-colors">
                    Back to Portfolio
                </button>
            </div>
        </div>
        </div>
    </header>

    <!-- Projects Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Projects will be dynamically loaded here -->
        </div>
        
        <!-- Loading indicator -->
        <div id="loadingIndicator" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900"></div>
            <p class="mt-4 text-gray-600">Loading projects...</p>
        </div>
    </main>

        <!-- Call to Action -->
        <div class="text-center mt-16 bg-gradient-to-r from-blue-900 to-teal-600 rounded-2xl p-12 text-white">
        <h2 class="text-3xl font-bold mb-4">Ready to Start Your Project?</h2>
        <p class="text-xl mb-8 opacity-90">Let's discuss how I can bring innovative solutions to your technical challenges.</p>
        <button onclick="window.close()" class="bg-white text-blue-900 px-8 py-3 rounded-lg font-semibold hover:bg-gray-100 transition-colors">
            Contact Me Today
        </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <p>&copy; 2025 Erastus Ochieng. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Known project descriptions for specific images
        const projectDescriptions = {
            'IMG-20250518-WA0033.jpg': {
                title: 'Commercial Solar Installation',
                description: '200kW solar system installation for manufacturing facility, reducing energy costs by 60% and providing sustainable power generation.',
                category: 'Solar Technology',
                client: 'Manufacturing Corp',
                year: '2024',
                color: 'green'
            },
            'IMG-20250518-WA0024.jpg': {
                title: 'Integrated Security System',
                description: 'Complete CCTV and access control system for corporate headquarters with 50+ cameras and biometric access points.',
                category: 'CCTV & Security',
                client: 'Corporate HQ',
                year: '2024',
                color: 'red'
            },
            'IMG-20250518-WA0008.jpg': {
                title: 'Smart Building Automation',
                description: 'Comprehensive electrical and automation system for modern office complex with energy management and smart controls.',
                category: 'Electrical Systems',
                client: 'Office Complex',
                year: '2024',
                color: 'blue'
            },
            'IMG-20250518-WA0026.jpg': {
                title: 'Residential Security Package',
                description: 'Complete home security solution with wireless CCTV, smart locks, and mobile app integration for remote monitoring.',
                category: 'Access Control',
                client: 'Private Residence',
                year: '2024',
                color: 'purple'
            },
            'IMG-20250518-WA0016.jpg': {
                title: 'Industrial Power Distribution',
                description: 'High-voltage electrical installation and power distribution system for manufacturing plant with backup generators.',
                category: 'Power Systems',
                client: 'Industrial Plant',
                year: '2023',
                color: 'yellow'
            },
            'IMG-20250518-WA0004.jpg': {
                title: 'Off-Grid Solar Solution',
                description: 'Complete off-grid solar system with battery storage for remote location, providing 24/7 reliable power supply.',
                category: 'Solar Technology',
                client: 'Remote Facility',
                year: '2023',
                color: 'green'
            }
        };

        // Category colors
        const categoryColors = {
            'Solar Technology': 'green',
            'CCTV & Security': 'red',
            'Electrical Systems': 'blue',
            'Access Control': 'purple',
            'Power Systems': 'yellow',
            'System Integration': 'indigo',
            'Technical Consulting': 'gray'
        };

        // Generate default description for images without specific details
        function generateDefaultProject(imageName) {
            const nameWithoutExt = imageName.replace(/\.[^/.]+$/, "");
            const randomYear = 2023 + Math.floor(Math.random() * 3);
            const categories = Object.keys(categoryColors);
            const randomCategory = categories[Math.floor(Math.random() * categories.length)];
            const color = categoryColors[randomCategory];
            
            return {
                title: `Project ${nameWithoutExt}`,
                description: `Technical solution implementation showcasing expertise in ${randomCategory.toLowerCase()} with modern technology and best practices.`,
                category: randomCategory,
                client: 'Various Clients',
                year: randomYear.toString(),
                color: color
            };
        }

        // Create project card HTML
        function createProjectCard(project, imagePath) {
            return `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition-shadow group">
                    <div class="relative overflow-hidden">
                        <img src="${imagePath}" alt="${project.title}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-300" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgZmlsbD0iI2Y3ZjdmNyIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE4IiBmaWxsPSIjOTk5IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+SW1hZ2UgTm90IEZvdW5kPC90ZXh0Pjwvc3ZnPg='; console.error('Failed to load image:', '${imagePath}');">
                        <div class="absolute top-4 left-4">
                            <span class="bg-${project.color}-100 text-${project.color}-800 px-3 py-1 rounded-full text-sm font-medium">${project.category}</span>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-semibold text-gray-900 mb-2">${project.title}</h3>
                        <p class="text-gray-600 mb-4">${project.description}</p>
                        <div class="flex items-center justify-between text-sm text-gray-500">
                            <span>Client: ${project.client}</span>
                            <span>${project.year}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Load all images dynamically
        async function loadAllImages() {
            const projectsGrid = document.getElementById('projectsGrid');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            try {
                console.log('Loading images...');
                
                // Fetch the image list from JSON file
                const response = await fetch('./images.json');
                if (!response.ok) {
                    throw new Error('Failed to load image list');
                }
                
                const allImages = await response.json();
                console.log('Found images:', allImages);
                
                // Filter out non-image files and create project cards
                const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.svg', '.webp'];
                const validImages = allImages.filter(img => {
                    const ext = img.toLowerCase().substring(img.lastIndexOf('.'));
                    return imageExtensions.includes(ext);
                });
                
                console.log('Valid images:', validImages);

                let projectsHTML = '';
                
                validImages.forEach(imageName => {
                    const imagePath = `images/${imageName}`;
                    console.log('Creating card for:', imagePath);
                    const project = projectDescriptions[imageName] || generateDefaultProject(imageName);
                    projectsHTML += createProjectCard(project, imagePath);
                });

                // Hide loading indicator and show projects
                loadingIndicator.style.display = 'none';
                projectsGrid.innerHTML = projectsHTML;
                
                // Update the page title with the number of projects
                document.title = `All Projects (${validImages.length}) - Erastus Ochieng`;
                
                console.log('Projects loaded successfully');
                
            } catch (error) {
                console.error('Error loading images:', error);
                loadingIndicator.innerHTML = '<p class="text-red-600">Error loading projects. Please refresh the page.</p>';
            }
        }

        // Refresh image list and update display
        async function refreshImages() {
            const projectsGrid = document.getElementById('projectsGrid');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            // Show loading indicator
            loadingIndicator.style.display = 'block';
            loadingIndicator.innerHTML = '<div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-900"></div><p class="mt-4 text-gray-600">Refreshing projects...</p>';
            
            // Clear current projects
            projectsGrid.innerHTML = '';
            
            // Add cache-busting parameter to force refresh
            try {
                const response = await fetch('./images.json?t=' + Date.now());
                if (response.ok) {
                    await loadAllImages();
                }
            } catch (error) {
                console.error('Error refreshing images:', error);
                loadingIndicator.style.display = 'none';
            }
        }

        // Fallback function to load images without JSON
        function loadImagesFallback() {
            const projectsGrid = document.getElementById('projectsGrid');
            const loadingIndicator = document.getElementById('loadingIndicator');
            
            console.log('Using fallback method...');
            
            // Fallback image list (hardcoded)
            const fallbackImages = [
                'IMG-20250518-WA0033.jpg', 'IMG-20250518-WA0024.jpg', 'IMG-20250518-WA0008.jpg',
                'IMG-20250518-WA0026.jpg', 'IMG-20250518-WA0016.jpg', 'IMG-20250518-WA0004.jpg',
                'ErastusHome.jpg', 'portfolio1.jpg', 'portfolio2.jpg', 'portfolio3.jpg',
                'portfolio4.jpg', 'portfolio5.jpg', 'portfolio6.jpg'
            ];
            
            let projectsHTML = '';
            
            fallbackImages.forEach(imageName => {
                const imagePath = `images/${imageName}`;
                const project = projectDescriptions[imageName] || generateDefaultProject(imageName);
                projectsHTML += createProjectCard(project, imagePath);
            });
            
            loadingIndicator.style.display = 'none';
            projectsGrid.innerHTML = projectsHTML;
            document.title = `All Projects (${fallbackImages.length}) - Erastus Ochieng`;
            
            console.log('Fallback loaded successfully');
        }

        // Load images when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadAllImages().catch(error => {
                console.error('Dynamic loading failed, using fallback:', error);
                loadImagesFallback();
            });
        });

        // Auto-refresh functionality to detect new images every 30 seconds
        setInterval(refreshImages, 30000);

        // Add keyboard shortcut for manual refresh (Ctrl+R or F5)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey && e.key === 'r') || e.key === 'F5') {
                e.preventDefault();
                refreshImages();
            }
        });
    </script>
    </body>

</html>
